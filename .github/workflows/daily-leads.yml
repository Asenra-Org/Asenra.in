name: Daily Leads Automation

on:
  schedule:
    # Run every day at 3:00 AM UTC (8:30 AM IST)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI with inputs
    inputs:
      location:
        description: 'Target Location/City (e.g., Mumbai, Bangalore, Pune, Delhi)'
        required: true
        default: 'Mumbai'
        type: string
      industry:
        description: 'Target Industry/Query (e.g., dentists, gyms, cafes, hotels)'
        required: true
        default: 'dentists'
        type: string

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install @supabase/supabase-js

      - name: Run Scraper Script
        run: node scripts/scrape-leads.js
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TARGET_LOCATION: ${{ github.event.inputs.location }}
          TARGET_INDUSTRY: ${{ github.event.inputs.industry }}
